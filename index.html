<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tech Tree</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0d14;
      --bg2: #111520;
      --border: rgba(255,255,255,0.07);
      --text: #e8e4d8;
      --text2: #9a9585;
      --text3: #6b6660;
      --gold: #c8a84b;
      --era1: #4a90c4;
      --era2: #56b87a;
      --era3: #c8832a;
      --era4: #c44b7a;
      --era5: #7a5bc4;
      --era6: #c45050;
      --wonder: #c8a84b;
      --radius: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; overflow: hidden; }

    /* HEADER */
    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(10,13,20,0.96); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      height: 54px; padding: 0 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .logo { font-family: 'Cinzel', serif; font-weight: 900; font-size: 17px; letter-spacing: 0.12em; color: var(--gold); flex: 1; }
    .logo span { color: var(--text2); font-weight: 400; }
    .lang-toggle { display: flex; gap: 2px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; padding: 3px; }
    .lang-btn { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.1em; padding: 4px 12px; border-radius: 16px; border: none; background: transparent; color: var(--text2); cursor: pointer; transition: all 0.2s; }
    .lang-btn.active { background: var(--gold); color: #0a0d14; font-weight: 700; }
    .zoom-ctrl { display: flex; align-items: center; gap: 2px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; padding: 3px 6px; }
    .zoom-btn { font-size: 14px; width: 26px; height: 26px; border-radius: 50%; border: none; background: transparent; color: var(--text2); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .zoom-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .zoom-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.08em; color: var(--text2); min-width: 38px; text-align: center; }

    /* VIEWPORT */
    #viewport { position: fixed; top: 54px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; user-select: none; }
    #viewport.panning { cursor: grabbing; }
    #world { position: absolute; top: 0; left: 0; transform-origin: 0 0; }

    /* SVG */
    #svg-layer { position: absolute; top: 0; left: 0; overflow: visible; pointer-events: none; z-index: 1; }

    /* NODES */
    .tech-node {
      position: absolute; border-radius: var(--radius); border: 1px solid;
      padding: 8px 10px; cursor: pointer; z-index: 2;
      display: flex; flex-direction: column; gap: 3px;
      transition: box-shadow 0.15s, border-color 0.15s;
      overflow: hidden;
    }
    .tech-node::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: var(--radius) var(--radius) 0 0; }
    .tech-node:hover { z-index: 5; }

    .era-1 { background: rgba(74,144,196,0.1); border-color: rgba(74,144,196,0.3); }
    .era-1::before { background: var(--era1); }
    .era-1:hover { border-color: var(--era1); box-shadow: 0 4px 20px rgba(74,144,196,0.2); }

    .era-2 { background: rgba(86,184,122,0.1); border-color: rgba(86,184,122,0.3); }
    .era-2::before { background: var(--era2); }
    .era-2:hover { border-color: var(--era2); box-shadow: 0 4px 20px rgba(86,184,122,0.2); }

    .era-3 { background: rgba(200,131,42,0.1); border-color: rgba(200,131,42,0.3); }
    .era-3::before { background: var(--era3); }
    .era-3:hover { border-color: var(--era3); box-shadow: 0 4px 20px rgba(200,131,42,0.2); }

    .era-4 { background: rgba(196,75,122,0.1); border-color: rgba(196,75,122,0.3); }
    .era-4::before { background: var(--era4); }
    .era-4:hover { border-color: var(--era4); box-shadow: 0 4px 20px rgba(196,75,122,0.2); }

    .era-5 { background: rgba(122,91,196,0.1); border-color: rgba(122,91,196,0.3); }
    .era-5::before { background: var(--era5); }
    .era-5:hover { border-color: var(--era5); box-shadow: 0 4px 20px rgba(122,91,196,0.2); }

    .era-6 { background: rgba(196,80,80,0.1); border-color: rgba(196,80,80,0.3); }
    .era-6::before { background: var(--era6); }
    .era-6:hover { border-color: var(--era6); box-shadow: 0 4px 20px rgba(196,80,80,0.2); }

    .wonder-node { background: rgba(200,168,75,0.08); border-color: rgba(200,168,75,0.35); border-style: dashed; }
    .wonder-node::before { background: var(--wonder); }
    .wonder-node:hover { border-color: var(--wonder); box-shadow: 0 4px 20px rgba(200,168,75,0.2); }

    .era-unlock { border-width: 1.5px; }
    .era-1.era-unlock { border-color: var(--era1); box-shadow: 0 0 10px rgba(74,144,196,0.15); }
    .era-2.era-unlock { border-color: var(--era2); box-shadow: 0 0 10px rgba(86,184,122,0.15); }
    .era-3.era-unlock { border-color: var(--era3); box-shadow: 0 0 10px rgba(200,131,42,0.15); }
    .era-4.era-unlock { border-color: var(--era4); box-shadow: 0 0 10px rgba(196,75,122,0.15); }
    .era-5.era-unlock { border-color: var(--era5); box-shadow: 0 0 10px rgba(122,91,196,0.15); }
    .era-6.era-unlock { border-color: var(--era6); box-shadow: 0 0 10px rgba(196,80,80,0.15); }

    .node-era-badge { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; opacity: 0.7; }
    .era-1 .node-era-badge { color: var(--era1); }
    .era-2 .node-era-badge { color: var(--era2); }
    .era-3 .node-era-badge { color: var(--era3); }
    .era-4 .node-era-badge { color: var(--era4); }
    .era-5 .node-era-badge { color: var(--era5); }
    .era-6 .node-era-badge { color: var(--era6); }
    .wonder-node .node-era-badge { color: var(--wonder); }
    .node-name { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 700; letter-spacing: 0.02em; color: var(--text); line-height: 1.3; }
    .node-desc { font-family: 'Inter', sans-serif; font-size: 9.5px; font-weight: 300; color: var(--text2); line-height: 1.4; }
    .node-costs { display: flex; gap: 8px; margin-top: 2px; }
    .node-cost { font-family: 'Cinzel', serif; font-size: 9px; color: var(--text3); display: flex; align-items: center; gap: 3px; }

    /* SELECTION STATES */
    .node-faded { opacity: 0.1 !important; transition: opacity 0.25s; }
    .node-path { opacity: 1 !important; transition: opacity 0.25s; }
    .node-selected { opacity: 1 !important; box-shadow: 0 0 0 2px white, 0 0 24px rgba(255,255,255,0.2) !important; z-index: 10 !important; transform: scale(1.02); transition: opacity 0.25s, box-shadow 0.25s; }
    .edge-faded { stroke-opacity: 0.04 !important; }
    .edge-active { stroke-opacity: 0.95 !important; stroke-width: 2.5px !important; }

    /* DETAIL PANEL */
    #detail-panel {
      position: fixed; right: 0; top: 54px; bottom: 0; width: 300px;
      background: var(--bg2); border-left: 1px solid var(--border);
      transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      z-index: 50; display: flex; flex-direction: column; overflow: hidden;
    }
    #detail-panel.open { transform: translateX(0); }
    .panel-header { padding: 18px 18px 14px; border-bottom: 1px solid var(--border); position: relative; }
    .panel-stripe { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .panel-era-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 6px; opacity: 0.8; }
    .panel-title { font-family: 'Cinzel', serif; font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.2; margin-bottom: 12px; }
    .panel-costs { display: flex; gap: 16px; }
    .panel-cost-item { display: flex; flex-direction: column; gap: 2px; }
    .panel-cost-label { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); }
    .panel-cost-value { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 700; color: var(--gold); }
    .panel-body { flex: 1; overflow-y: auto; padding: 14px 18px; }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .panel-section { margin-bottom: 18px; }
    .panel-section-title { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
    .panel-desc { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 300; color: var(--text2); line-height: 1.6; }
    .req-list { display: flex; flex-direction: column; gap: 4px; }
    .req-item { display: flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 4px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.05em; color: var(--text2); cursor: pointer; transition: background 0.15s; }
    .req-item:hover { background: rgba(255,255,255,0.06); }
    .req-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .req-type { font-size: 8px; color: var(--text3); margin-left: auto; }
    #close-panel { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    #close-panel:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* LEGEND */
    #legend { position: fixed; bottom: 14px; left: 14px; background: rgba(10,13,20,0.9); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; z-index: 40; display: flex; gap: 12px; flex-wrap: wrap; backdrop-filter: blur(8px); }
    .legend-item { display: flex; align-items: center; gap: 6px; font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); }
    .legend-line { width: 18px; height: 2px; border-radius: 1px; opacity: 0.6; }

    /* HINT */
    #hint { position: fixed; bottom: 14px; right: 14px; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); animation: fadeOut 5s 2s forwards; }
    @keyframes fadeOut { to { opacity: 0; } }

    /* VIEW TOGGLE */
    .view-toggle { display: flex; gap: 2px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; padding: 3px; }
    .view-btn { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.08em; padding: 4px 14px; border-radius: 16px; border: none; background: transparent; color: var(--text2); cursor: pointer; transition: all 0.2s; }
    .view-btn.active { background: rgba(255,255,255,0.12); color: var(--text); font-weight: 600; }

    /* CHECKED STATE */
    .node-checked {
      background-image: linear-gradient(135deg, rgba(196,80,80,0.18) 0%, rgba(196,80,80,0.08) 100%) !important;
      border-color: rgba(196,80,80,0.7) !important;
      box-shadow: 0 0 12px rgba(196,80,80,0.25), inset 0 0 20px rgba(196,80,80,0.06) !important;
    }
    .node-checked::before { background: #c45050 !important; }

    .node-checkbox {
      position: absolute; top: 6px; right: 6px;
      width: 16px; height: 16px;
      border-radius: 4px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      z-index: 10;
      flex-shrink: 0;
    }
    .node-checkbox:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.08); }
    .node-checkbox.checked { background: #c45050; border-color: #c45050; }
    .node-checkbox.checked::after { content: '✓'; font-size: 10px; color: #fff; line-height: 1; font-weight: 700; }
  </style>
</head>
<body>

<header>
  <div class="logo">Tech<span>Tree</span></div>
  <div class="view-toggle">
    <button class="view-btn active" id="btn-view-all" onclick="setViewMode('all')" data-i18n="viewAll">All</button>
    <button class="view-btn" id="btn-view-checked" onclick="setViewMode('checked')" data-i18n="viewChecked">Checked</button>
    <button class="view-btn" id="btn-view-unchecked" onclick="setViewMode('unchecked')" data-i18n="viewUnchecked">Unchecked</button>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-ru" onclick="setLang('ru')">RU</button>
  </div>
  <div class="zoom-ctrl">
    <button class="zoom-btn" onclick="zoomBy(-0.15)">−</button>
    <span class="zoom-label" id="zoom-label">100%</span>
    <button class="zoom-btn" onclick="zoomBy(0.15)">+</button>
    <button class="zoom-btn" style="font-size:11px" onclick="resetView()">↺</button>
  </div>
</header>

<div id="viewport">
  <div id="world">
    <svg id="svg-layer"></svg>
  </div>
</div>

<div id="detail-panel">
  <div class="panel-header">
    <div class="panel-stripe" id="panel-stripe"></div>
    <div class="panel-era-label" id="panel-era-label"></div>
    <div class="panel-title" id="panel-title"></div>
    <div class="panel-costs" id="panel-costs"></div>
    <button id="close-panel" onclick="closePanel()">×</button>
  </div>
  <div class="panel-body">
    <div class="panel-section">
      <div class="panel-section-title" id="lbl-unlocks">Unlocks</div>
      <div class="panel-desc" id="panel-desc"></div>
    </div>
    <div class="panel-section" id="panel-reqs-section">
      <div class="panel-section-title" id="lbl-requires">Requires</div>
      <div class="req-list" id="panel-reqs"></div>
    </div>
  </div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-line" style="background:var(--era1)"></div><span id="leg-req">Required</span></div>
  <div class="legend-item"><div class="legend-line" style="background:var(--text3);border-top:1.5px dashed var(--text3);height:0"></div><span id="leg-or">Any of</span></div>
</div>
<div id="hint" id="hint">scroll to zoom · drag to pan</div>

1 уровень юнитов, +1 слот Чуда','tech_abyssal_composites':'Металл Т5, Кожа Т5, Меч Т5','tech_abyssal_working':'Открывает Лук Т5, Арбалет, Топор, Щит Т5','tech_council_of_eight':'Открывает Совет Восьми','tech_robotics':'3 ОП за первого юнита Ур.10; 1 ОП/нед за уникальный тип','tech_enlightenment':'3 ОП при завершении; 1 ОП в неделю'
  };

  // Layout columns
  const LAYOUT = [
    ['tech_ancient_era'],
    ['tech_belief'],
    ['tech_mining','tech_agriculture','tech_laws','tech_pantheon'],
    ['tech_classical_era'],
    ['tech_artisanship','tech_iron_working','tech_armory','tech_productivity','tech_pottery','tech_calendar','tech_state_workforce','tech_brewing'],
    ['tech_masonry','tech_toolsmithing','tech_the_wheel','tech_animal_husbandry','tech_code_of_laws'],
    ['tech_construction_site','tech_land_taxes','tech_trading','tech_writing','tech_monarchy'],
    ['tech_antiquity_era'],
    ['tech_steel_working','tech_craftsmanship','tech_castles','tech_military_tradition','tech_deep_mining','tech_commerce','tech_horseback_riding','tech_minting','tech_barter','tech_early_empire'],
    ['tech_foundation','tech_sifting','tech_sailing','tech_conservation','tech_priesthood','tech_guilds'],
    ['tech_logistic','tech_gunpowder','tech_open_field_excavation','tech_aquaculture','tech_baking','tech_printing_press','tech_scholarship','tech_global_trade','tech_feudalism'],
    ['tech_medieval_era'],
    ['tech_carbide_working','tech_chemical_bonding','tech_philosophy','tech_mining_guilds','tech_rationalism','tech_exploration','tech_ritual','tech_currency','tech_construction'],
    ['tech_siege_tactics','tech_branch_mining','tech_turbines','tech_importation','tech_ideology','tech_compass','tech_education','tech_taxation','tech_urbanization','tech_advanced_masonry'],
    ['tech_fortification','tech_machinery','tech_mercantile','tech_inquisition','tech_energy_study','tech_gears','tech_banking','tech_nationalism','tech_sanitization'],
    ['tech_renaissance_era'],
    ['tech_composite','tech_titanium_working','tech_communication','tech_advanced_efficiency','tech_engineering','tech_replaceable_parts','tech_tourism','tech_civil_service','tech_trade_networks','tech_economics','tech_agency','tech_politics','tech_core_mining'],
    ['tech_radio','tech_globalization','tech_industrialization','tech_world_trade','tech_cultural_heritage','tech_experimentation','tech_stock_market','tech_capitalism','tech_hydroponics'],
    ['tech_industrial_era'],
    ['tech_abyssal_composites','tech_abyssal_working','tech_council_of_eight'],
    ['tech_robotics','tech_enlightenment'],
  ];

  const NW = 148, NH = 96, CG = 44, RG = 20;
  const WCOLS = 3;

  // Build techMap
  const techMap = {};
  TECHS.forEach(t => techMap[t.id] = t);
  WONDERS.forEach(w => techMap[w.id] = {...w, era:0, wonder:true, cost:75000, req:null});

  let lang = localStorage.getItem('tt_lang') || 'en';
  let zoom = parseFloat(localStorage.getItem('tt_zoom')) || 1;
  let panX = parseFloat(localStorage.getItem('tt_panX')) || 20;
  let panY = parseFloat(localStorage.getItem('tt_panY')) || 20;
  let selectedId = null;
  let viewMode = localStorage.getItem('tt_viewMode') || 'all';
  const checkedIds = new Set(JSON.parse(localStorage.getItem('tt_checked') || '[]'));

  function saveState() {
    localStorage.setItem('tt_checked', JSON.stringify([...checkedIds]));
    localStorage.setItem('tt_viewMode', viewMode);
    localStorage.setItem('tt_lang', lang);
    localStorage.setItem('tt_zoom', zoom);
    localStorage.setItem('tt_panX', panX);
    localStorage.setItem('tt_panY', panY);
  }

  function fmtN(n) {
    if (!n) return '0';
    if (n >= 1000000) return (n/1000000).toFixed(n%1000000===0?0:1)+'M';
    if (n >= 1000) return Math.round(n/1000)+'K';
    return String(n);
  }
  function parseReqs(s) { return s ? s.split(/[\/:]/).filter(Boolean) : []; }
  function isOrStr(s) { return s && s.includes('/'); }
  function getName(t) { return lang==='ru' && NAMES_RU[t.id] ? NAMES_RU[t.id] : t.name; }
  function getDesc(t) { return lang==='ru' && DESC_RU[t.id] ? DESC_RU[t.id] : t.desc||''; }
  function tr(k) { return I18N[lang][k] || k; }

  // ── Build positions ───────────────────────────
  let positions = {};

  function buildPositions() {
    positions = {};
    // Main tech grid
    let maxRows = 0;
    LAYOUT.forEach(col => { if (col.length > maxRows) maxRows = col.length; });
    const maxColH = maxRows * (NH + RG) - RG;

    let cx = 20;
    LAYOUT.forEach(col => {
      const colH = col.length * (NH + RG) - RG;
      const startY = 20 + Math.round((maxColH - colH) / 2);
      col.forEach((id, i) => {
        positions[id] = { x: cx, y: startY + i*(NH+RG), w: NW, h: NH };
      });
      cx += NW + CG;
    });

    // Wonder grid (3 columns)
    cx += 10; // extra gap before wonders
    const wRows = Math.ceil(WONDERS.length / WCOLS);
    const wColH = wRows * (NH + RG) - RG;
    const wStartY = 20 + Math.round((maxColH - wColH) / 2);
    WONDERS.forEach((w, i) => {
      const col = i % WCOLS;
      const row = Math.floor(i / WCOLS);
      positions[w.id] = { x: cx + col*(NW + CG/2), y: wStartY + row*(NH+RG), w: NW, h: NH };
    });
  }

  // ── Render ────────────────────────────────────
  function render() {
    buildPositions();
    const world = document.getElementById('world');
    // Remove old nodes
    Array.from(world.children).forEach(c => { if (c.id !== 'svg-layer') c.remove(); });

    // Compute canvas size
    let maxX = 0, maxY = 0;
    Object.values(positions).forEach(p => {
      if (p.x + p.w > maxX) maxX = p.x + p.w;
      if (p.y + p.h > maxY) maxY = p.y + p.h;
    });
    maxX += 20; maxY += 20;

    const svg = document.getElementById('svg-layer');
    svg.style.width = maxX + 'px';
    svg.style.height = maxY + 'px';
    svg.setAttribute('width', maxX);
    svg.setAttribute('height', maxY);
    svg.innerHTML = `<defs><marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;

    // Draw edges
    const drawn = new Set();
    TECHS.forEach(tech => {
      if (!tech.req) return;
      const toPos = positions[tech.id];
      if (!toPos) return;
      const isOr = isOrStr(tech.req);
      parseReqs(tech.req).forEach(reqId => {
        const fromPos = positions[reqId];
        if (!fromPos) return;
        const key = reqId + '->' + tech.id;
        if (drawn.has(key)) return;
        drawn.add(key);
        const fromT = techMap[reqId];
        const col = ERA_COLORS[fromT ? fromT.era : 1] || '#888';
        const x1 = fromPos.x + fromPos.w, y1 = fromPos.y + fromPos.h/2;
        const x2 = toPos.x, y2 = toPos.y + toPos.h/2;
        const mx = (x1+x2)/2;
        const path = document.createElementNS('http://www.w3.org/2000/svg','path');
        path.setAttribute('d', `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
        path.setAttribute('fill','none');
        path.setAttribute('stroke', col);
        path.setAttribute('stroke-width', isOr ? '1':'1.8');
        path.setAttribute('stroke-opacity', isOr ? '0.35':'0.5');
        if (isOr) path.setAttribute('stroke-dasharray','5 4');
        path.setAttribute('marker-end','url(#arr)');
        path.classList.add('edge-path');
        path.dataset.from = reqId;
        path.dataset.to = tech.id;
        svg.appendChild(path);
      });
    });

    // Draw tech nodes
    TECHS.forEach(tech => {
      const pos = positions[tech.id];
      if (!pos) return;
      const div = makeNode(tech, pos);
      world.appendChild(div);
    });

    // Wonders section label
    const wFirst = positions[WONDERS[0].id];
    if (wFirst) {
      const wTotalW = WCOLS * NW + (WCOLS-1) * CG/2;
      const lbl = document.createElement('div');
      lbl.style.cssText = `position:absolute;left:${wFirst.x}px;top:${wFirst.y - 20}px;width:${wTotalW}px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--wonder);opacity:0.7;text-align:center;`;
      lbl.textContent = '✦ ' + tr('eraW') + ' ✦';
      world.appendChild(lbl);
    }

    // Draw wonder nodes
    WONDERS.forEach(w => {
      const pos = positions[w.id];
      if (!pos) return;
      const t = { ...w, era: 0, wonder: true };
      const div = makeNode(t, pos);
      world.appendChild(div);
    });

    applyHighlight();
    applyViewMode();
  }

  function makeNode(tech, pos) {
    const div = document.createElement('div');
    div.className = 'tech-node era-' + (tech.era||0) + (tech.unlock_era ? ' era-unlock':'') + (tech.wonder ? ' wonder-node':'');
    div.style.left = pos.x + 'px';
    div.style.top = pos.y + 'px';
    div.style.width = pos.w + 'px';
    div.style.minHeight = pos.h + 'px';
    div.dataset.id = tech.id;

    if (checkedIds.has(tech.id)) div.classList.add('node-checked');

    // Checkbox
    const cb = document.createElement('div');
    cb.className = 'node-checkbox' + (checkedIds.has(tech.id) ? ' checked' : '');
    cb.addEventListener('click', e => { e.stopPropagation(); toggleChecked(tech.id); });
    div.appendChild(cb);

    const badge = document.createElement('div');
    badge.className = 'node-era-badge';
    badge.textContent = tech.wonder ? tr('wonder') : tech.unlock_era ? tr('eraUnlock') : (tr('era'+tech.era)||'');
    div.appendChild(badge);

    const name = document.createElement('div');
    name.className = 'node-name';
    name.textContent = getName(tech);
    div.appendChild(name);

    const desc = document.createElement('div');
    desc.className = 'node-desc';
    desc.textContent = getDesc(tech);
    div.appendChild(desc);

    const costs = document.createElement('div');
    costs.className = 'node-costs';
    costs.innerHTML = `<span class="node-cost">🔬 ${fmtN(tech.bc)}</span>${tech.cost ? `<span class="node-cost">💰 ${fmtN(tech.cost)}</span>` : ''}`;
    div.appendChild(costs);

    div.addEventListener('click', e => { e.stopPropagation(); selectTech(tech.id); });
    return div;
  }

  // ── Selection & highlight ─────────────────────
  function getAncestors(id, visited = new Set()) {
    if (visited.has(id)) return visited;
    visited.add(id);
    const t = techMap[id];
    if (t && t.req) parseReqs(t.req).forEach(r => getAncestors(r, visited));
    return visited;
  }

  function applyHighlight() {
    const world = document.getElementById('world');
    const svg = document.getElementById('svg-layer');
    if (!selectedId) {
      world.querySelectorAll('.tech-node').forEach(el => el.classList.remove('node-selected','node-path','node-faded'));
      svg.querySelectorAll('.edge-path').forEach(el => el.classList.remove('edge-active','edge-faded'));
      return;
    }
    const ancestors = getAncestors(selectedId);
    world.querySelectorAll('.tech-node').forEach(el => {
      const id = el.dataset.id;
      el.classList.remove('node-selected','node-path','node-faded');
      if (id === selectedId) el.classList.add('node-selected');
      else if (ancestors.has(id)) el.classList.add('node-path');
      else el.classList.add('node-faded');
    });
    svg.querySelectorAll('.edge-path').forEach(el => {
      el.classList.remove('edge-active','edge-faded');
      if (ancestors.has(el.dataset.from) && ancestors.has(el.dataset.to))
        el.classList.add('edge-active');
      else
        el.classList.add('edge-faded');
    });
  }

  function selectTech(id) {
    selectedId = id;
    applyHighlight();
    openPanel(id);
  }

  function openPanel(id) {
    const tech = techMap[id];
    if (!tech) return;
    const col = ERA_COLORS[tech.era] || '#888';
    const t = I18N[lang];
    document.getElementById('panel-stripe').style.background = col;
    document.getElementById('panel-era-label').style.color = col;
    document.getElementById('panel-era-label').textContent = tech.wonder ? t.wonder : tech.unlock_era ? t.eraUnlock : (t['era'+tech.era]||'');
    document.getElementById('panel-title').textContent = getName(tech);
    document.getElementById('panel-desc').textContent = getDesc(tech);
    document.getElementById('lbl-unlocks').textContent = t.unlocks;
    document.getElementById('lbl-requires').textContent = t.requires;
    document.getElementById('leg-req').textContent = t.legReq;
    document.getElementById('leg-or').textContent = t.legOr;
    document.getElementById('panel-costs').innerHTML = `
    <div class="panel-cost-item"><div class="panel-cost-label">${t.labelBeaker}</div><div class="panel-cost-value">🔬 ${fmtN(tech.bc)}</div></div>
    <div class="panel-cost-item"><div class="panel-cost-label">${t.labelCost}</div><div class="panel-cost-value">💰 ${fmtN(tech.cost||0)}</div></div>`;
    const reqsEl = document.getElementById('panel-reqs');
    reqsEl.innerHTML = '';
    const section = document.getElementById('panel-reqs-section');
    if (tech.req) {
      section.style.display = '';
      const isOr = isOrStr(tech.req);
      parseReqs(tech.req).forEach(reqId => {
        const rt = techMap[reqId];
        if (!rt) return;
        const item = document.createElement('div');
        item.className = 'req-item';
        item.innerHTML = `<div class="req-dot" style="background:${ERA_COLORS[rt.era]||'#888'}"></div><span>${getName(rt)}</span><span class="req-type">${isOr ? t.orReq : t.andReq}</span>`;
        item.onclick = () => selectTech(reqId);
        reqsEl.appendChild(item);
      });
    } else {
      section.style.display = 'none';
    }
    document.getElementById('detail-panel').classList.add('open');
  }

  function closePanel() {
    selectedId = null;
    applyHighlight();
    document.getElementById('detail-panel').classList.remove('open');
  }

  // Click empty area = deselect
  document.getElementById('viewport').addEventListener('click', () => closePanel());

  function toggleChecked(id) {
    if (checkedIds.has(id)) checkedIds.delete(id);
    else checkedIds.add(id);
    // Update node visuals in-place without full re-render
    const world = document.getElementById('world');
    const node = world.querySelector(`.tech-node[data-id="${id}"]`);
    if (node) {
      node.classList.toggle('node-checked', checkedIds.has(id));
      var cb = node.querySelector('.node-checkbox');
      if (cb) cb.classList.toggle('checked', checkedIds.has(id));
    }
    applyViewMode();
    saveState();
  }

  function setViewMode(mode) {
    viewMode = mode;
    document.getElementById('btn-view-all').classList.toggle('active', mode === 'all');
    document.getElementById('btn-view-checked').classList.toggle('active', mode === 'checked');
    document.getElementById('btn-view-unchecked').classList.toggle('active', mode === 'unchecked');
    applyViewMode();
    saveState();
  }

  function applyViewMode() {
    const world = document.getElementById('world');
    const svg = document.getElementById('svg-layer');
    world.querySelectorAll('.tech-node').forEach(el => {
      const id = el.dataset.id;
      const isChecked = checkedIds.has(id);
      var faded = false;
      if (viewMode === 'checked' && !isChecked) faded = true;
      if (viewMode === 'unchecked' && isChecked) faded = true;
      el.style.opacity = faded ? '0.15' : '';
      el.style.pointerEvents = faded ? 'none' : '';
    });
    svg.querySelectorAll('.edge-path').forEach(el => {
      const fromFaded = viewMode === 'checked' ? !checkedIds.has(el.dataset.from) : viewMode === 'unchecked' ? checkedIds.has(el.dataset.from) : false;
      const toFaded = viewMode === 'checked' ? !checkedIds.has(el.dataset.to) : viewMode === 'unchecked' ? checkedIds.has(el.dataset.to) : false;
      el.style.opacity = (fromFaded || toFaded) ? '0.05' : '';
    });
  }

  function setLang(l) {
    lang = l;
    document.getElementById('btn-en').classList.toggle('active', l==='en');
    document.getElementById('btn-ru').classList.toggle('active', l==='ru');
    // Update view mode button labels
    var t = I18N[lang];
    document.getElementById('btn-view-all').textContent = t.viewAll;
    document.getElementById('btn-view-checked').textContent = t.viewChecked;
    document.getElementById('btn-view-unchecked').textContent = t.viewUnchecked;
    render();
    if (selectedId) openPanel(selectedId);
    saveState();
  }

  // ── Pan + zoom ────────────────────────────────
  function applyTransform() {
    document.getElementById('world').style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
    document.getElementById('zoom-label').textContent = Math.round(zoom*100)+'%';
    saveState();
  }

  function zoomAt(newZoom, ox, oy) {
    newZoom = Math.max(0.15, Math.min(3, newZoom));
    const worldX = (ox - panX) / zoom;
    const worldY = (oy - panY) / zoom;
    zoom = newZoom;
    panX = ox - worldX * zoom;
    panY = oy - worldY * zoom;
    applyTransform();
  }

  function zoomBy(delta) {
    const vp = document.getElementById('viewport');
    zoomAt(zoom + delta, vp.clientWidth/2, vp.clientHeight/2);
  }

  function resetView() { zoom=1; panX=20; panY=20; applyTransform(); }

  let isPanning = false, didPan = false;
  let px0=0, py0=0, panX0=0, panY0=0;

  const vp = document.getElementById('viewport');
  vp.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    isPanning = true; didPan = false;
    px0 = e.clientX; py0 = e.clientY;
    panX0 = panX; panY0 = panY;
    vp.classList.add('panning');
  });
  window.addEventListener('mousemove', e => {
    if (!isPanning) return;
    const dx = e.clientX - px0, dy = e.clientY - py0;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didPan = true;
    panX = panX0 + dx; panY = panY0 + dy;
    applyTransform();
  });
  window.addEventListener('mouseup', () => {
    if (!isPanning) return;
    isPanning = false;
    vp.classList.remove('panning');
  });

  // Capture phase: suppress click after pan
  vp.addEventListener('click', e => {
    if (didPan) { e.stopPropagation(); didPan = false; }
  }, true);

  // Wheel = zoom to cursor
  vp.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = vp.getBoundingClientRect();
    const ox = e.clientX - rect.left;
    const oy = e.clientY - rect.top;
    const delta = e.deltaMode === 1 ? e.deltaY * 30 : e.deltaY;
    zoomAt(zoom * Math.pow(0.999, delta), ox, oy);
  }, { passive: false });

  // Touch
  let touchState = {}, lastPinchD = null, touchPanX0=0, touchPanY0=0, touchPX0=0, touchPY0=0;
  vp.addEventListener('touchstart', e => {
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t => touchState[t.identifier] = [t.clientX, t.clientY]);
    const pts = Object.values(touchState);
    if (pts.length === 1) { touchPX0=pts[0][0]; touchPY0=pts[0][1]; touchPanX0=panX; touchPanY0=panY; lastPinchD=null; }
    else if (pts.length === 2) { lastPinchD = Math.hypot(pts[1][0]-pts[0][0], pts[1][1]-pts[0][1]); }
  }, {passive:false});
  vp.addEventListener('touchmove', e => {
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t => { if (touchState[t.identifier]) touchState[t.identifier]=[t.clientX,t.clientY]; });
    const pts = Object.values(touchState);
    if (pts.length===1) { panX=touchPanX0+(pts[0][0]-touchPX0); panY=touchPanY0+(pts[0][1]-touchPY0); applyTransform(); }
    else if (pts.length===2 && lastPinchD) {
      const d = Math.hypot(pts[1][0]-pts[0][0],pts[1][1]-pts[0][1]);
      const rect = vp.getBoundingClientRect();
      const mx=(pts[0][0]+pts[1][0])/2-rect.left, my=(pts[0][1]+pts[1][1])/2-rect.top;
      zoomAt(zoom*(d/lastPinchD),mx,my); lastPinchD=d;
    }
  },{passive:false});
  vp.addEventListener('touchend', e => {
    Array.from(e.changedTouches).forEach(t => delete touchState[t.identifier]);
    const pts=Object.values(touchState);
    if (pts.length===1){touchPX0=pts[0][0];touchPY0=pts[0][1];touchPanX0=panX;touchPanY0=panY;lastPinchD=null;}
  },{passive:false});

  // Init
  // Restore saved lang
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
  // Restore saved view mode buttons
  document.getElementById('btn-view-all').classList.toggle('active', viewMode === 'all');
  document.getElementById('btn-view-checked').classList.toggle('active', viewMode === 'checked');
  document.getElementById('btn-view-unchecked').classList.toggle('active', viewMode === 'unchecked');
  // Restore view mode button labels for saved lang
  var _t = I18N[lang];
  document.getElementById('btn-view-all').textContent = _t.viewAll;
  document.getElementById('btn-view-checked').textContent = _t.viewChecked;
  document.getElementById('btn-view-unchecked').textContent = _t.viewUnchecked;
  render();
  applyTransform();
</script>
</body>
</html>
