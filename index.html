<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tech Tree</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <div class="logo">Tech<span>Tree</span></div>
  <button id="queue-toggle-btn" onclick="toggleQueuePanel()">📋 Queue</button>
  <button class="city-btn" id="city-btn" onclick="toggleCityModal()">⚙ City</button>
  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="Search…" oninput="onSearchInput()"/>
    <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
  </div>
  <div class="view-toggle">
    <button class="view-btn active" id="vbtn-all"    onclick="setView('all')">All</button>
    <button class="view-btn"        id="vbtn-done"   onclick="setView('done')">✓ Checked</button>
    <button class="view-btn"        id="vbtn-undone" onclick="setView('undone')">○ Unchecked</button>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn"        id="btn-ru" onclick="setLang('ru')">RU</button>
  </div>
  <div class="zoom-ctrl">
    <button class="zoom-btn" onclick="zoomBy(-0.15)">−</button>
    <span class="zoom-label" id="zoom-label">100%</span>
    <button class="zoom-btn" onclick="zoomBy(0.15)">+</button>
    <button class="zoom-btn" style="font-size:11px" onclick="resetView()">↺</button>
  </div>
</header>

<div id="city-modal-overlay" onclick="onCityOverlayClick(event)">
  <div id="city-modal">
    <div class="city-modal-header">
      <span class="city-modal-title" id="lbl-city-title">City Settings</span>
      <button class="city-modal-close" onclick="closeCityModal()">×</button>
    </div>
    <div class="city-modal-body">
      <div class="city-field">
        <div class="city-field-label" id="lbl-city-beakers">Beakers per hour</div>
        <div class="city-field-row">
          <span class="city-field-icon">🔬</span>
          <input class="city-input" id="city-beakers" type="number" min="0" placeholder="0" oninput="onCityInput()"/>
        </div>
        <div class="city-field-hint" id="lbl-city-beakers-hint">Used to calculate research time</div>
      </div>
      <div class="city-field">
        <div class="city-field-label" id="lbl-city-towns">Count Towns</div>
        <div class="city-field-row">
          <span class="city-field-icon">🏘</span>
          <input class="city-input" id="city-towns" type="number" min="0" placeholder="0" oninput="onCityInput()"/>
        </div>
        <div class="city-field-hint" id="lbl-city-towns-hint">Each town adds +10% to beaker cost</div>
      </div>
    </div>
  </div>
</div>

<div id="queue-panel">
  <div class="queue-header">
    <span class="queue-title" id="lbl-queue-title">Research Queue</span>
    <button class="queue-clear-btn" id="lbl-queue-clear" onclick="clearQueue()">Clear</button>
    <button id="close-queue" onclick="toggleQueuePanel()">×</button>
  </div>
  <div id="queue-error"></div>
  <div class="queue-list" id="queue-list"></div>
  <div class="queue-footer">
    <div class="queue-total" id="queue-total"></div>
    <div class="export-row">
      <button class="export-btn" onclick="exportQueue('txt')">⬇ TXT</button>
      <button class="export-btn" onclick="exportQueue('md')">⬇ MD</button>
      <button class="export-btn" onclick="exportQueue('copy')">⧉ Copy</button>
    </div>
  </div>
</div>

<div id="viewport">
  <div id="world">
    <svg id="svg-layer"></svg>
  </div>
</div>

<div id="detail-panel">
  <div class="panel-header">
    <div class="panel-stripe" id="panel-stripe"></div>
    <div class="panel-era-label" id="panel-era-label"></div>
    <div class="panel-title" id="panel-title"></div>
    <div class="panel-costs" id="panel-costs"></div>
    <button id="close-panel" onclick="closePanel()">×</button>
  </div>
  <div class="panel-body">
    <div class="panel-section">
      <div class="panel-section-title" id="lbl-unlocks">Unlocks</div>
      <div class="panel-desc" id="panel-desc"></div>
    </div>
    <div class="panel-section" id="panel-reqs-section">
      <div class="panel-section-title" id="lbl-requires">Requires</div>
      <div class="req-list" id="panel-reqs"></div>
    </div>
    <div class="panel-section" id="panel-chain-section">
      <div class="panel-section-title" id="lbl-chain">Chain Cost</div>
      <div class="chain-cost-block">
        <div class="chain-cost-title" id="lbl-chain-remaining">Remaining to research</div>
        <div class="chain-cost-row">
          <span>🔬</span>
          <span class="chain-cost-value" id="chain-bc-value">0</span>
          <span class="chain-cost-sub" id="chain-bc-skipped"></span>
        </div>
        <div class="chain-cost-row">
          <span>💰</span>
          <span class="chain-cost-value" id="chain-cost-value">0</span>
          <span class="chain-cost-sub" id="chain-cost-skipped"></span>
        </div>
        <div class="panel-research-time" id="panel-research-time" style="display:none">
          <span class="panel-time-icon">⏱</span>
          <span class="panel-time-value" id="panel-time-value">—</span>
          <span class="panel-time-label" id="lbl-time-label">research time</span>
        </div>
      </div>
      <button class="queue-btn" id="panel-queue-btn" onclick="toggleQueueItem()"></button>
    </div>
  </div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-line" style="background:var(--era1)"></div><span id="leg-req">Required</span></div>
  <div class="legend-item"><div class="legend-line" style="background:var(--text3);border-top:1.5px dashed var(--text3);height:0"></div><span id="leg-or">Any of</span></div>
</div>
<div id="hint">scroll to zoom · drag to pan</div>

<script src="main.js"></script>
</body>
</html>
